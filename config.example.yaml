# goagent 配置样例。
#
# 用法:复制本文件为 config.yaml(committed 默认)或 config.local.yaml(本地 secret,
# 已在 .gitignore)。也可全部用环境变量,不需要任何文件。
#
# 优先级:内置默认值 < config.yaml < config.local.yaml < 环境变量 < 代码 WithXxx

llm:
  provider: agnes                              # openai | deepseek | agnes | anthropic
  base_url: https://apihub.agnes-ai.com/v1
  model: gemini-2.5-flash
  # api_key 建议放 config.local.yaml 或环境变量(AGNES_API_KEY / GOAGENT_LLM_API_KEY)
  api_key: ""

embeddings:
  base_url: https://apihub.agnes-ai.com/v1
  model: text-embedding-3-small
  api_key: ""

redis:
  url: redis://localhost:6379

# queue 旋钮:只有"随环境变化"的才放这;其余留给 queue 包默认值。
# 调用方(如 examples/redis 的 queueOpts)把这些值映射成 queue.With* Option。
queue:
  stream: goagent:jobs
  group: workers
  idle_threshold: 5m        # 未 ack 多久后重投(time.Duration 字符串)
  max_deliveries: 3         # 超过则进死信流
  max_len: 100000           # Redis stream MAXLEN ~ 近似上限

eval:
  live: false                                  # true 时评估用真实模型(等价 EVAL_LIVE=1)

# 日志系统(logger 包)。调用方把这些值映射成 logger.With* Option。
log:
  level: info               # debug | info | warn | error(GOAGENT_LOG_LEVEL 可覆盖)
  format: console           # console(彩色,开发) | json(生产采集)
  output: stderr            # stderr | stdout | 文件路径
  caller: false             # 是否附带调用方 文件:行号(有性能开销)

